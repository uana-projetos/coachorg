<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="0.7" cy="0.3">
      <stop offset="0%" stop-color="#ff5252" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff5252" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <circle cx="900" cy="220" r="400" fill="url(#glowGrad)"/>

  <g transform="translate(120, 200)">
    <g transform="translate(0,0)">
      <rect width="200" height="200" rx="44" fill="#1a1a2e" stroke="#ff525230" stroke-width="2"/>
      <rect x="46" y="50" width="108" height="22" rx="6" fill="url(#accentGrad)"/>
      <circle cx="60" cy="61" r="7" fill="#1a1a2e"/>
      <path d="M55 61 L59 65 L66 56" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="46" y="82" width="108" height="22" rx="6" fill="url(#accentGrad)" opacity="0.7"/>
      <rect x="46" y="114" width="108" height="22" rx="6" fill="url(#accentGrad)" opacity="0.4"/>
      <rect x="46" y="146" width="108" height="22" rx="6" fill="url(#accentGrad)" opacity="0.2"/>
    </g>

    <text x="240" y="60" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="-2">Coach<tspan fill="#ff5252">Org</tspan></text>
    <text x="240" y="100" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#999" letter-spacing="3">ORGANIZE. CRESÇA. CONTROLE.</text>

    <g transform="translate(240, 130)">
      <rect width="780" height="60" rx="14" fill="#ff525215" stroke="#ff525240" stroke-width="1.5"/>
      <text x="30" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff">⚡ Agenda + Pagamentos + WhatsApp + Treinos · Tudo num app</text>
    </g>
  </g>

  <g transform="translate(120, 480)">
    <text font-family="Arial, sans-serif" font-weight="800" font-size="56" fill="#ffffff">
      <tspan>O app feito </tspan>
      <tspan fill="url(#accentGrad)">pra você não perder aluno</tspan>
    </text>
    <text y="80" font-family="Arial, sans-serif" font-weight="400" font-size="22" fill="#aaa">Personal trainer brasileiro. Funciona offline. Instala como app de loja.</text>
  </g>

  <g transform="translate(120, 660)">
    <rect width="240" height="36" rx="18" fill="#4ade8020" stroke="#4ade80" stroke-width="1.5"/>
    <text x="120" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#4ade80">✓ GARANTIA DE 7 DIAS</text>

    <rect x="260" width="280" height="36" rx="18" fill="#ff525220" stroke="#ff5252" stroke-width="1.5"/>
    <text x="400" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#ff5252">🔥 PREÇO DE LANÇAMENTO</text>
  </g>
</svg>
