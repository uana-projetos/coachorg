      <tspan>Não perca aluno. </tspan>
      <tspan fill="url(#accent)">Nem pagamento.</tspan>
    </text>
    <text y="58" font-family="Arial, sans-serif" font-weight="500" font-size="22" fill="#aaa">Agenda + Pagamentos + WhatsApp + IA. Tudo no celular.</text>
  </g>

  <g transform="translate(80, 560)">
    <rect width="240" height="44" rx="22" fill="url(#accent)"/>
    <text x="120" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="16" fill="#fff">⚡ TESTE GRÁTIS HOJE</text>

    <text x="270" y="29" font-family="Arial, sans-serif" font-weight="500" font-size="14" fill="#666">coachorg-app.github.io/coachorg</text>
  </g>
