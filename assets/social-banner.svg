<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2">
      <stop offset="0%" stop-color="#ff5252" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff5252" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="160" r="380" fill="url(#glow)"/>

  <g transform="translate(80, 150)">
    <rect width="180" height="180" rx="40" fill="#1a1a2e" stroke="#ff525230" stroke-width="2"/>
    <rect x="42" y="46" width="96" height="20" rx="6" fill="url(#accent)"/>
    <circle cx="54" cy="56" r="6.5" fill="#1a1a2e"/>
    <path d="M50 56 L53 59 L59 51" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="42" y="74" width="96" height="20" rx="6" fill="url(#accent)" opacity="0.7"/>
    <rect x="42" y="102" width="96" height="20" rx="6" fill="url(#accent)" opacity="0.4"/>
    <rect x="42" y="130" width="96" height="20" rx="6" fill="url(#accent)" opacity="0.2"/>
  </g>

  <g transform="translate(310, 200)">
    <text font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="84" fill="#ffffff" letter-spacing="-3">Coach<tspan fill="#ff5252">Org</tspan></text>
    <text y="50" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#999" letter-spacing="3">PARA PERSONAL TRAINERS</text>
  </g>

  <g transform="translate(80, 410)">
