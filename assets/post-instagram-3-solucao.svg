  <text x="60" y="140" font-family="Arial, sans-serif" font-weight="800" font-size="38" fill="#4ade80">A SOLUÇÃO</text>

  <text x="60" y="260" font-family="Arial, sans-serif" font-weight="700" font-size="46" fill="#aaa">Cansei. Sentei.</text>
